<!DOCTYPE html>
<html>
<head>
  <title>Inventario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="bg"></div>

<!-- ── SCREEN 0: Login ── -->
<div id="login-screen">
  <div class="login-card">
    <p class="login-brand">AG Inventory</p>
    <p class="login-sub">Facilitador de inventario</p>
    <p style="font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(232,220,200,0.2); margin: 0 0 32px;">beta version</p>
    <input class="login-input" id="inputUser" type="text" placeholder="Usuario" autocomplete="off">
    <input class="login-input" id="inputPass" type="password" placeholder="Contraseña" autocomplete="off">
    <button class="login-btn" onclick="login()">Ingresar</button>
    <p id="msgLogin"></p>
    <p class="login-powered">Powered by AGalvis</p>
  </div>
</div>

<!-- ── SCREEN 1: Main ── -->
<div id="main-screen">
  <h2>Producto a escanear</h2>
  <div id="reader" style="width:300px; margin:auto;"></div>
  <button onclick="startScanner()">📷 Iniciar Scanner</button>
  <button onclick="stopScanner()">⏹️ Detener Scanner</button>
  <br><br>
  <input id="manualCode" placeholder="Prod a buscar...">
  <button onclick="searchProduct()">Buscar</button>
  <br><br>
  <button onclick="getProducts()">📦 Ver inventario</button>
  <button onclick="openAdd()">➕ Agregar producto</button>
  <br><br>
  <button id="btnDeliveryNote" onclick="openDeliveryNote()">📋 Nueva remisión</button>
  <p id="result"></p>
  <div id="actions" style="margin-top:20px; display:none;">
    <button onclick="addStock(true)">➕ Agregar</button>
    <button onclick="addStock(false)">➖ Descontar</button>
    <br>
    <input
      id="qty"
      type="number"
      placeholder="Cantidad"
      style="margin-top:10px; padding:8px; font-size:16px; border:2px solid #007bff; border-radius:8px; background-color:#e6f0ff;"
    />
  </div>
  <p style="font-size:11px; color:#aaa; margin-top:32px;">Powered by AG Inventory</p>
  <br><br>
  <button onclick="logout()" style="font-size:11px; background:none; border:none; color:#aaa; cursor:pointer; text-decoration:underline;">Cerrar sesión</button>
</div>

<!-- ── SCREEN 2: Inventory list ── -->
<div id="inventory-screen" style="display:none;">
  <button onclick="showScreen('main-screen')" style="margin-bottom:16px;">← Volver</button>
  <div id="lista-inventario"></div>
</div>

<!-- ── SCREEN 3: Add product ── -->
<div id="adding-screen" style="display:none;">
  <button onclick="showScreen('main-screen')" style="margin-bottom:16px;">← Volver</button>
  <div id="formAgregar" style="max-width:340px; margin:0 auto; text-align:left; background:#f9f9f9; border:1px solid #ddd; border-radius:12px; padding:16px;">
    <h3 style="text-align:center; margin:0 0 14px; font-size:16px;">Nuevo producto</h3>
    <input id="inputCodigo" type="number" placeholder="Código (auto)" readonly>
    <input id="inputNombre" type="text" placeholder="Nombre del producto">
    <input id="inputPrecio" type="number" placeholder="Precio">
    <input id="inputStock" type="number" placeholder="Stock inicial">
    <button onclick="saveProduct()">💾 Guardar</button>
    <p id="msgFormulario"></p>
    <div id="qr-nuevo" style="text-align:center;"></div>
  </div>
</div>

<!-- ── SCREEN 4: Delivery note ── -->
<div id="deliverynote-screen" style="display:none;">
  <button onclick="showScreen('main-screen')" style="margin-bottom:16px;">← Volver</button>
  <h3>Nueva remisión</h3>
  <div id="lista-remision"></div>
  <div id="carrito" style="margin-top:16px;"></div>
  <div style="max-width:400px; margin:auto; padding:12px 0;">
    <input id="remisionDestinatario" placeholder="Nombre del destinatario"
           style="width:100%; padding:8px; margin-bottom:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
    <input id="remisionDireccion" placeholder="Dirección (opcional)"
           style="width:100%; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
  </div>
  <div id="btn-generar" style="display:none; text-align:center; margin-top:16px;">
    <button onclick="generateDeliveryNote()">📄 Generar remisión</button>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
