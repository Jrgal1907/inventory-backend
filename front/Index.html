<!DOCTYPE html>
<html>
<head>
  <title>Inventario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
  body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
  }

  /* fondo (logo) */
  #bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url('luzzial.jpeg') no-repeat center center;
    background-size: contain;

    opacity: 0.12;
    z-index: -1;
  }
</style>

<body>
<div id="bg"></div>

<h2>Producto a escanear</h2>

<div id="reader" style="width:300px; margin:auto;"></div>

<button onclick="startScanner()">📷 Iniciar Scanner</button>
<br>

<input id="manualCode" placeholder="Código del producto">
<button onclick="checkproduct()">Buscar</button>
<br>

<button onclick="getProducts()">📦 Ver inventario</button>

<p><strong>Resultado:</strong></p>

<div id="actions" style="margin-top:20px; display:none;">
  <button onclick="addStock()">➕ Agregar</button>
  <button onclick="removeStock()">➖ Descontar</button>
  <br>

  <input 
    id="qty" 
    type="number" 
    placeholder="Cantidad"
    style="margin-top:10px; padding:8px; font-size:16px; border:2px solid #007bff; border-radius:8px; background-color:#e6f0ff;"
  />
</div>

<p id="result">Aun no se ha escaneado producto</p>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let currentProductKey = null;
let scanned = false;
let laststock=null; // ultimo stock antes de update

/* procesamiento del QR */
async function onScanSuccess(decodedText) {
  if (scanned) return;
  scanned = true;

  // limpieza del código QR
  const cleanCode = decodedText
    .trim()
    .replace(/\s/g, '')
    .replace(/[^\d]/g, '');

  console.log("QR RAW:", decodedText);
  console.log("QR CLEAN:", cleanCode);

  document.getElementById('result').innerText = "Cargando...";

  try {
    const response = await fetch('https://inventory-backend-mwnq.onrender.com/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: cleanCode })
    });

    const data = await response.json();

    if (data.error) {
      document.getElementById('result').innerText = "No encontrado";
      document.getElementById('actions').style.display = "none";
      return;
    }

    currentProductKey = cleanCode;
    laststock=data.stock; // stock inicial

    document.getElementById('result').innerText =
      `Producto: ${data.name}
Precio: $${data.price}
Stock: ${data.stock}`;

    document.getElementById('actions').style.display = "block";

  } catch (err) {
    document.getElementById('result').innerText = "Error conectando al backend";
  }
}

/* agregar stock */
async function addStock() {
  if (!currentProductKey) return;

  const input = document.getElementById("qty");
  const qty = parseInt(input.value) || 1;

  document.getElementById('result').innerText = "Cargando...";

  try {
    const res = await fetch('https://inventory-backend-mwnq.onrender.com/update-stock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code: currentProductKey,
        qty: qty
      })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById('result').innerText = data.error;
      return;
    }

    input.value = "";

const previous = lastStock;
const current = data.stock;
const diff = current - previous;

document.getElementById('result').innerText =
  `Actualizado

Producto: ${data.name}
Precio: $${data.price}

Stock anterior: ${previous}
Cambio: +${diff}
Stock actual: ${current}`;

lastStock = current;

  } catch {
    document.getElementById('result').innerText = "Error conectando al backend";
  }
}

/* quitar stock */
async function removeStock() {
  if (!currentProductKey) return;

  const input = document.getElementById("qty");
  const qty = parseInt(input.value) || 1;

  document.getElementById('result').innerText = "Cargando...";

  try {
    const res = await fetch('https://inventory-backend-mwnq.onrender.com/update-stock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code: currentProductKey,
        qty: -qty
      })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById('result').innerText = data.error;
      return;
    }

    input.value = "";

const previous = lastStock;
const current = data.stock;
const diff = current - previous;

document.getElementById('result').innerText =
  `Actualizado

Producto: ${data.name}
Precio: $${data.price}

Stock anterior: ${previous}
Cambio: ${diff}
Stock actual: ${current}`;

lastStock = current;

  } catch {
    document.getElementById('result').innerText = "Error conectando al backend";
  }
}

/* búsqueda manual */
async function checkproduct() {
  let code = document.getElementById("manualCode").value;

  // validación básica
  if (!code || isNaN(code)) {
    document.getElementById('result').innerText = "Código inválido";
    return;
  }

  code = code.trim();

  document.getElementById('result').innerText = "Cargando...";

  try {
    const res = await fetch('https://inventory-backend-mwnq.onrender.com/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById('result').innerText = "No encontrado";
      return;
    }

    currentProductKey = code;
    laststock=data.stock;

    document.getElementById('result').innerText =
      `Producto: ${data.name}
Precio: $${data.price}
Stock: ${data.stock}`;

    document.getElementById('actions').style.display = "block";

  } catch {
    document.getElementById('result').innerText = "Error conectando al backend";
  }
}

/* listar productos */
async function getProducts() {
  document.getElementById('result').innerText = "Cargando...";

  try {
    const res = await fetch('https://inventory-backend-mwnq.onrender.com/products');
    const data = await res.json();

    let text = "Inventario:\n\n";

    data.forEach(p => {
      text += `${p.name} - Stock: ${p.stock}\n`;
    });

    document.getElementById('result').innerText = text;

  } catch {
    document.getElementById('result').innerText = "Error conectando al backend";
  }
}

/* inicializar scanner */
const html5QrCode = new Html5Qrcode("reader");
let scanning = false;

function startScanner() {
  if (scanning) return;

  setTimeout(() => {
    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 300, height: 300 }
      },
      onScanSuccess
    ).then(() => {
      scanning = true;
    }).catch(() => {
      html5QrCode.start(
        { facingMode: "user" },
        {
          fps: 10,
          qrbox: 250
        },
        onScanSuccess
      ).then(() => {
        scanning = true;
      });
    });
  }, 300);
}
</script>

</body>
</html>
